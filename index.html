<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, My Love ✨</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(-45deg, #ffafbd, #ffc3a0, #ffb3d9, #ffccd5);
            background-size: 400% 400%;
            animation: gradientBG 8s ease infinite;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 🎂 TikTok Style Cake Animation */
        .cake-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
        }
        .candle {
            width: 8px;
            height: 30px;
            background: linear-gradient(#ff4d4d, #fff);
            border-radius: 4px;
            position: relative;
        }
        .flame {
            width: 12px;
            height: 18px;
            background: #ffbc00;
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -18px;
            left: -2px;
            box-shadow: 0 0 10px #ffbc00, 0 0 20px #ff4d4d;
            animation: flicker 0.1s ease infinite alternate;
        }
        .cake-emoji {
            font-size: 4rem;
            margin-top: -5px;
            line-height: 1;
        }

        .album-container {
            background: rgba(255, 255, 255, 0.93);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(255, 71, 126, 0.25);
            max-width: 90%;
            width: 350px;
            z-index: 10;
            text-align: center;
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.6);
            transform: scale(0.9);
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* 🌟 TikTok Inspired Text Styling */
        .Happy__Birthday {
            font-family: 'Segoe UI', sans-serif;
            font-size: 2.3rem;
            font-weight: 700;
            color: #ff477e;
            text-shadow: 2px 2px 5px rgba(255, 255, 255, 0.8);
            margin: 10px 0;
            animation: textPulse 1.5s ease-in-out infinite alternate;
        }

        /* 📖 3D Album Slide */
        .slide {
            display: none;
            perspective: 1000px;
        }
        .pixel-art {
            width: 100%;
            height: auto;
            max-height: 260px;
            object-fit: contain;
            border-radius: 15px;
            border: 6px solid #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            image-rendering: pixelated;
            animation: flipIn 0.6s ease-in-out forwards;
        }

        .caption {
            margin-top: 15px;
            color: #4a4a4a;
            font-size: 1rem;
            line-height: 1.6;
            min-height: 50px;
            font-weight: 500;
        }

        /* 🔘 Buttons */
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
        .nav-btn {
            background-color: #ff477e;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 0.9rem;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(255, 71, 126, 0.2);
        }
        .nav-btn:hover {
            background-color: #ff0a54;
            transform: translateY(-2px);
        }
        .music-btn {
            background-color: #47a8ff;
            box-shadow: 0 4px 10px rgba(71, 168, 255, 0.2);
        }
        .music-btn:hover { background-color: #0a84ff; }

        /* 🎬 Keyframe Animations */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes popIn { to { transform: scale(1); } }
        @keyframes flicker {
            0% { transform: scale(1) rotate(-1deg); opacity: 0.9; }
            100% { transform: scale(1.1) rotate(1deg); opacity: 1; }
        }
        @keyframes textPulse {
            0% { transform: scale(1); text-shadow: 2px 2px 5px rgba(255, 71, 126, 0.3); }
            100% { transform: scale(1.03); color: #ff0a54; text-shadow: 2px 4px 10px rgba(255, 71, 126, 0.5); }
        }
        @keyframes flipIn {
            from { transform: rotateX(30deg); opacity: 0; }
            to { transform: rotateX(0deg); opacity: 1; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
    </audio>

    <div class="album-container">
        <div class="cake-container">
            <div class="candle"><div class="flame"></div></div>
            <div class="cake-emoji">🎂</div>
        </div>

        <div class="Happy__Birthday">Happy Birthday!</div>

        <div class="slide">
            <img src="https://via.placeholder.com/300x300.png?text=Pixel+Art+1" class="pixel-art">
            <p class="caption">ပထမဆုံး ဆွဲပေးဖြစ်ခဲ့တဲ့ Pixel Art လေး... 🌸</p>
        </div>

        <div class="slide">
            <img src="https://via.placeholder.com/300x300.png?text=Pixel+Art+2" class="pixel-art">
            <p class="caption">ဒီပုံလေး ဆွဲတုန်းက မင်းမျက်နှာလေးကို မြင်ယောင်နေမိတယ် 💖</p>
        </div>

        <div class="slide">
            <img src="https://via.placeholder.com/300x300.png?text=Pixel+Art+3" class="pixel-art">
            <p class="caption">မွေးနေ့ကစပြီး အမြဲတမ်း ပျော်ရွှင်ပါစေ မိန်းကလေးရေ ✨</p>
        </div>

        <div class="btn-container">
            <button class="nav-btn" onclick="changeSlide(-1)">⏮️ ရှေ့သို့</button>
            <button class="nav-btn music-btn" id="music-ctrl" onclick="toggleMusic()">🎵 ဖွင့်မည်</button>
            <button class="nav-btn" onclick="changeSlide(1)">နောက်သို့ ⏭️</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll(".slide");
        const music = document.getElementById("bg-music");
        const musicBtn = document.getElementById("music-ctrl");

        function showSlide(index) {
            if (index >= slides.length) { currentSlide = 0; } 
            else if (index < 0) { slides.length - 1; } 
            else { currentSlide = index; }
            slides.forEach(slide => slide.style.display = "none");
            slides[currentSlide].style.display = "block";
            
            // Slide ပြောင်းတိုင်း မီးပန်းလေးတွေ ဖြန်းပေးမယ် 🎉
            confetti({ particleCount: 40, spread: 60, origin: { y: 0.7 } });
        }

        function changeSlide(step) { showSlide(currentSlide + step); }
        
        function toggleMusic() {
            if (music.paused) {
                music.play();
                musicBtn.innerText = "⏸️ ပိတ်မည်";
                // သီချင်းဖွင့်လိုက်တာနဲ့ မီးပန်းအကြီးကြီး ပစ်ဖောက်မယ်
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
            } else {
                music.pause();
                musicBtn.innerText = "🎵 ဖွင့်မည်";
            }
        }

        // စစချင်း ပထမဆုံး မီးပန်း အနည်းငယ် ဖောက်ပေးထားမယ်
        setTimeout(() => { confetti({ particleCount: 80, spread: 70 }); }, 1000);

        showSlide(currentSlide);
    </script>
</body>
</html>
