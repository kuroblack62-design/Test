<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, My Love ✨</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1, #f7aef8);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite; /* ရွေ့လျားနေမည့် Background Dynamic Animation */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 💖 Floating Hearts Animation */
        .heart {
            position: absolute;
            color: #ff477e;
            font-size: 20px;
            animation: float Up 6s linear infinite;
            opacity: 0.7;
            bottom: -20px;
            z-index: 1;
            pointer-events: none;
        }

        .album-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(255, 71, 126, 0.2);
            max-width: 90%;
            width: 360px;
            z-index: 10;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            transform: scale(0.95);
            animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        h1 {
            color: #ff477e;
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* 📖 Album Slide Effect */
        .slide {
            display: none;
            perspective: 1000px;
        }

        .pixel-art {
            width: 100%;
            height: auto;
            max-height: 280px;
            object-fit: contain;
            border-radius: 15px;
            border: 6px solid #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            image-rendering: pixelated;
            animation: flipIn 0.8s ease-in-out; /* ပုံလှန်မည့် 3D Animation */
        }

        .caption {
            margin-top: 20px;
            color: #4a4a4a;
            font-size: 1.05rem;
            line-height: 1.6;
            min-height: 60px;
            font-weight: 500;
        }

        /* 🔘 Music & Nav Buttons */
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .nav-btn {
            background-color: #ff477e;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 0.9rem;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(255, 71, 126, 0.3);
        }

        .nav-btn:hover {
            background-color: #ff0a54;
            transform: translateY(-2px);
        }

        .music-btn {
            background-color: #47a8ff;
            box-shadow: 0 4px 10px rgba(71, 168, 255, 0.3);
        }
        .music-btn:hover { background-color: #0a84ff; }

        /* 🎬 Animations Code */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes popIn { to { transform: scale(1); } }
        @keyframes flipIn {
            from { transform: rotateY(-90deg); opacity: 0; }
            to { transform: rotateY(0deg); opacity: 1; }
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
    </audio>

    <div class="album-container">
        <h1>Happy Birthday Album 🎂</h1>

        <div class="slide">
            <img src="https://via.placeholder.com/300x300.png?text=Pixel+Art+1" class="pixel-art">
            <p class="caption">ပထမဆုံး ဆွဲပေးဖြစ်ခဲ့တဲ့ Pixel Art လေး... 🌸</p>
        </div>

        <div class="slide">
            <img src="https://via.placeholder.com/300x300.png?text=Pixel+Art+2" class="pixel-art">
            <p class="caption">ဒီပုံလေး ဆွဲတုန်းက မင်းမျက်နှာလေးကို မြင်ယောင်နေမိတယ် 💖</p>
        </div>

        <div class="slide">
            <img src="https://via.placeholder.com/300x300.png?text=Pixel+Art+3" class="pixel-art">
            <p class="caption">မွေးနေ့ကစပြီး အမြဲတမ်း ပျော်ရွှင်ပါစေ မိန်းကလေးရေ ✨</p>
        </div>

        <div class="btn-container">
            <button class="nav-btn" onclick="changeSlide(-1)">⏮️ ရှေ့သို့</button>
            <button class="nav-btn music-btn" id="music-ctrl" onclick="toggleMusic()">🎵 ဖွင့်မည်</button>
            <button class="nav-btn" onclick="changeSlide(1)">နောက်သို့ ⏭️</button>
        </div>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll(".slide");
        const music = document.getElementById("bg-music");
        const musicBtn = document.getElementById("music-ctrl");

        function showSlide(index) {
            if (index >= slides.length) { currentSlide = 0; } 
            else if (index < 0) { currentSlide = slides.length - 1; } 
            else { currentSlide = index; }
            slides.forEach(slide => slide.style.display = "none");
            slides[currentSlide].style.display = "block";
        }

        function changeSlide(step) { showSlide(currentSlide + step); }
        
        // 🎵 သီချင်း ဖွင့်/ပိတ် စနစ်
        function toggleMusic() {
            if (music.paused) {
                music.play();
                musicBtn.innerText = "⏸️ ပိတ်မည်";
            } else {
                music.pause();
                musicBtn.innerText = "🎵 ဖွင့်မည်";
            }
        }

        // 💖 နှလုံးသားလေးများ အလိုအလျောက် ထွက်လာစေမည့် စနစ်
        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = ["💖", "💝", "❤️", "🌸"][Math.floor(Math.random() * 4)];
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 3 + 3 + "s";
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 6000);
        }
        setInterval(createHeart, 300); // 0.3 စက္ကန့်တိုင်း တစ်လုံးထွက်မယ်

        showSlide(currentSlide);
    </script>
</body>
</html>
