<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blow the Candle 🎂</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #ffe5ec; /* ပန်းရောင်နုနု နောက်ခံ */
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
            font-family: sans-serif;
        }

        /* 🎂 ကိတ်မုန့် တစ်ထပ်ချင်း ကျလာမည့်ပုံစံ */
        .cake-stage {
            display: flex; flex-direction: column; align-items: center;
        }
        .cake-layer {
            height: 30px; border-radius: 8px; margin-top: 2px;
            transform: translateY(-800px); /* စခရင်အပြင် အပေါ်ဆုံးကနေ စကျမယ် */
            animation: dropLayer 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        /* တစ်ထပ်ချင်းစီရဲ့ အကျယ်၊ အရောင်နဲ့ ကျလာမည့် စက္ကန့် Delay အချိန်များ */
        .layer-5 { width: 160px; background-color: #ff9f1c; animation-delay: 0.2s; }
        .layer-4 { width: 130px; background-color: #ff595e; animation-delay: 0.5s; }
        .layer-3 { width: 105px; background-color: #8ac926; animation-delay: 0.8s; }
        .layer-2 { width: 80px;  background-color: #1982c4; animation-delay: 1.1s; }
        .layer-1 { width: 55px;  background-color: #6a4c93; animation-delay: 1.4s; }

        /* 🕯️ ဖယောင်းတိုင် နှင့် မီးတောက် */
        .candle-container {
            display: flex; flex-direction: column; align-items: center;
            transform: translateY(-800px); animation: dropLayer 0.5s ease forwards; animation-delay: 1.7s;
        }
        .candle {
            width: 8px; height: 35px; background: linear-gradient(#ffccd5, #fff); border-radius: 3px;
        }
        .flame {
            width: 14px; height: 22px; background: #ffbc00; border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 10px #ffbc00, 0 0 20px #ff4d4d;
            animation: flicker 0.1s ease infinite alternate; 
            transition: 0.4s ease; /* မီးငြိမ်းတဲ့အခါ ဖြည်းဖြည်းချင်း သေးသွားအောင် */
        }
        .instruction {
            margin-top: 25px; color: #555; font-size: 1rem; font-weight: bold; text-align: center;
        }

        /* 🎬 Animations Keyframes */
        @keyframes dropLayer { to { transform: translateY(0); } }
        @keyframes flicker { 
            0% { transform: scale(1) rotate(-2deg); } 
            100% { transform: scale(1.1) rotate(2deg); } 
        }
    </style>
</head>
<body>

    <div class="cake-stage" id="cake-screen">
        <div class="candle-container">
            <div class="flame" id="main-flame"></div>
            <div class="candle"></div>
        </div>
        <div class="cake-layer layer-1"></div>
        <div class="cake-layer layer-2"></div>
        <div class="cake-layer layer-3"></div>
        <div class="cake-layer layer-4"></div>
        <div class="cake-layer layer-5"></div>
        
        <p class="instruction" id="status-text">ဖယောင်းတိုင်မီးကို မှုတ်လိုက်ပါ... 🌬️<br><span style="font-size:0.8rem; color:#888;">(သို့မဟုတ် ကိတ်မုန့်ကို နှိပ်ပါ)</span></p>
    </div>

    <script>
        const flame = document.getElementById("main-flame");
        const statusText = document.getElementById("status-text");

        // 🌬️ နည်းလမ်း (၁) - မိုက်ခရိုဖုန်းထဲ လေမှုတ်သံကို နားထောင်သည့်စနစ်
        navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioContext.createAnalyser();
            const microphone = audioContext.createMediaStreamSource(stream);
            const javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

            analyser.fftSize = 1024;
            microphone.connect(analyser);
            analyser.connect(javascriptNode);
            javascriptNode.connect(audioContext.destination);

            javascriptNode.onaudioprocess = function() {
                const array = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(array);
                let values = 0;
                for (let i = 0; i < array.length; i++) { values += array[i]; }
                let average = values / array.length;
                
                // အသံ သို့မဟုတ် လေမှုတ်သံ ကျယ်လာရင် မီးငြိမ်းမယ်
                if (average > 45) { 
                    blowOutCandle();
                    stream.getTracks().forEach(track => track.stop()); // မိုက်ခရိုဖုန်း ပြန်ပိတ်မယ်
                }
            };
        }).catch(err => {
            console.log("မိုက်ခရိုဖုန်း ခွင့်ပြုချက် မရခဲ့ပါ");
        });

        // 📱 နည်းလမ်း (၂) - မိုက်ခရိုဖုန်း အလုပ်မလုပ်ရင် လက်နဲ့နှိပ်ပြီး ငြိမ်းလို့ရမည့် Backup စနစ်
        document.getElementById("cake-screen").addEventListener("click", blowOutCandle);

        // 🔥 မီးငြိမ်းသွားစေမည့် လုပ်ဆောင်ချက်
        function blowOutCandle() {
            flame.style.transform = "scale(0)"; // မီးတောက်ကို သုညဆိုဒ်ဖြစ်အောင် ချုံ့ပစ်တာ (မီးငြိမ်းခြင်း)
            flame.style.opacity = "0";          // မီးတောက်ကို ပျောက်ကွယ်သွားစေတာ
            statusText.innerHTML = "<b style='color:#ff477e;'>မီးငြိမ်းသွားပါပြီ! လိမ္မာတယ် Chi ရေ...လက်ဆောင်လေးကိုကြည့်လို့ရပါပြီဗျ ❤️</b>";
        }
    </script>
</body>
</html>
