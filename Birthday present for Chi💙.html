<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Cake</title>
</head><style>
    body {
        margin: 0;
        background-color: #ffe5ec; /* နောက်ခံ ပန်းရောင် */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }
    
    /* ကိတ်မုန့်ပုံစံ */
    .layer {
        height: 30px;
        border-radius: 5px;
        margin-top: 2px;
        transform: translateY(-800px); /* စခရင်အပြင်မှာ သွားဝှက်ထားမယ် */
        animation: drop 0.5s ease forwards; /* အောက်ကျမယ့် ကာတွန်း */
    }
    
    /* တစ်ထပ်ချင်းစီရဲ့ အကျယ်နဲ့ အရောင် (Delay ပေးပြီး တစ်တုံးချင်း ကျခိုင်းမယ်) */
    .layer-5 { width: 150px; background-color: #ff9f1c; animation-delay: 0.2s; }
    .layer-4 { width: 120px; background-color: #ff595e; animation-delay: 0.4s; }
    .layer-3 { width: 95px;  background-color: #8ac926; animation-delay: 0.6s; }
    .layer-2 { width: 70px;  background-color: #1982c4; animation-delay: 0.8s; }
    .layer-1 { width: 45px;  background-color: #6a4c93; animation-delay: 1.0s; }

    /* ဖယောင်းတိုင် */
    .candle { width: 6px; height: 30px; background-color: white; }
    .flame {
        width: 12px; height: 18px; background-color: #ffbc00;
        border-radius: 50% 50% 20% 20%;
        transition: 0.3s ease; /* မီးငြိမ်းရင် ဖျတ်ခနဲမဟုတ်ဘဲ မှေးမှိန်သွားအောင် */
    }

    /* အပေါ်ကနေ မူလနေရာ (0) ကို ကျလာစေမည့် animation */
    @keyframes drop {
        to { transform: translateY(0); }
    }
</style>

<body>
  <div class="cake-stage" id="cake-screen">
    <div class="candle-container">
        <div class="flame" id="main-flame"></div>
        <div class="candle"></div>
    </div>
    
    <div class="layer layer-1"></div>
    <div class="layer layer-2"></div>
    <div class="layer layer-3"></div>
    <div class="layer layer-4"></div>
    <div class="layer layer-5"></div>
  </div>    <script>
        // HTML ထဲက မီးတောက် (flame) နဲ့ ကိတ်မုန့်စခရင် (cake-screen) ကို လှမ်းချိတ်တာ
        const flame = document.getElementById("main-flame");
        const cakeScreen = document.getElementById("cake-screen");

        // ကိတ်မုန့် စခရင်ကြီးတစ်ခုလုံးကို လက်နဲ့ နှိပ်လိုက်ရင် (click) ဖြစ်သွားမည့်အရာ
        cakeScreen.addEventListener("click", function() {
            flame.style.transform = "scale(0)"; // မီးတောက်ဆိုဒ်ကို ၀ ဖြစ်အောင် ချုံ့ပစ်မယ်
            flame.style.opacity = "0";          // မီးတောက်ကို မှေးမှိန်ပျောက်ကွယ်သွားစေမယ်
        });
  </script>
    
</body>
</html>
